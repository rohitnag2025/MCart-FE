<ng-container *ngIf="isLoggedIn; else loginOnly">
	<div class="top-bar">
		<div class="top-bar-right">
			<a routerLink="/user/profile">Profile</a>
			<a href="#" (click)="onLogout()">Logout</a>
		</div>
	</div>
</ng-container>
<ng-template #loginOnly>
	<!-- Only show routed content (login, forgot password, etc.) when not logged in -->
</ng-template>
<router-outlet />
