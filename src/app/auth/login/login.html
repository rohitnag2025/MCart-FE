<div class="login-container">
	<h2>Login</h2>
	<form (submit)="onLogin($event)">
		<label>Email</label>
		<input type="email" name="email" [(ngModel)]="email" required />
		<label>Password</label>
		<input type="password" name="password" [(ngModel)]="passwordHash" required />
		<button type="submit">Login</button>
	</form>
	<div class="social-login">
		<p>Or login with :</p>
		<button (click)="loginWithProvider('facebook')">Login with Facebook</button>
		<!-- <button (click)="loginWithProvider('twitter')">Login with X (Twitter)</button> -->
		<button (click)="loginWithXNew()">X LOGIN NEW</button>
	</div>
</div>
